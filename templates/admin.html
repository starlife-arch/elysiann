{% extends 'base.html' %}{% block content %}<div class='container'><h2>Admin Dashboard</h2><div class='stats'>{% for k,v in stats.items() %}<div class='card'><h3>{{k}}</h3><p>{{v}}</p></div>{% endfor %}</div>{% for u in users %}<article class='card'><h3>{{u.full_name}} ({{u.uid}})</h3><p>Status: {{u.status}} | Role: {{u.role}} | Paid: {{u.paid}} | Banned: {{u.banned}}</p><form method='post' class='inline'><input type='hidden' name='target_uid' value='{{u.uid}}'><button name='action' value='approve' class='btn gold'>Approve</button><button name='action' value='reject' class='btn'>Reject</button><button name='action' value='ban' class='btn'>Ban</button><button name='action' value='unban' class='btn'>Unban</button></form></article>{% endfor %}</div>{% endblock %}
